app:
  name: __SERVICE_NAME__
  env: dev

http:
  host: 0.0.0.0
  port: 8080
  read_timeout: 5s
  write_timeout: 10s
  idle_timeout: 60s

postgres:
  dsn: host=127.0.0.1 user=postgres password=postgres dbname=__SERVICE_NAME__ sslmode=disable
  max_idle_conns: 4
  max_open_conns: 16
  conn_max_lifetime: 1h

redis:
  enabled: false
  addr: 127.0.0.1:6379
  username: ""
  password: ""
  db: 0
  dial_timeout: 3s
  read_timeout: 1s
  write_timeout: 1s

log:
  level: info
  encoding: console
  development: true

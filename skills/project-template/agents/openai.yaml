interface:
  display_name: "Project Template"
  short_description: "Own reusable project code templates and AGENTS.md starters"
  default_prompt: "Use $project-template to create, select, or evolve reusable project code templates and project-level AGENTS.md starter content. Keep documentation scaffolding owned by documentation-architecture, harness initialization owned by harness-engineering, and workflow package installation owned by workflow-package-manager. Ensure any AGENTS.md starter includes a project-specific testing prompt and references existing script-based verification when present. When a template would benefit from a repo-scoped task/spec/workspace workflow layer, mention Trellis installation as an explicit optional recommendation instead of silently inventing it. When the project wants recurring post-delivery review governance, route review evidence to docs/reviews/ and unresolved debt to docs/todos/debt/ with a reusable debt file template instead of one global DEBT.md."

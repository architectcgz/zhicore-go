# Code Review Quality Checklist
#
# 用途：强制 review 时逐维度检查，防止遗漏关键质量维度
# 每个维度包含：
#   - dimension: 维度名称
#   - source: 对应的 reference 段落
#   - items: 具体检查项列表
#   - verdict_required: 是否强制输出结论（pass / findings / N/A）

dimensions:
  - dimension: "资源泄漏与生命周期"
    source: "references/technical-risk-checks.md ## Resource lifecycle and cleanup"
    verdict_required: true
    items:
      - "后端：DB 连接、HTTP client、文件句柄是否在 defer/finally 或显式 cleanup 中释放"
      - "后端：resp.Body.Close() 是否 deferred"
      - "后端：goroutine 是否有 context cancellation 或 wait group 协调"
      - "后端：文件句柄在 read/write 错误时是否仍能关闭"
      - "后端：后台 timer/ticker 是否在 context cancel 时停止"
      - "前端：setInterval/setTimeout/addEventListener 是否在 onUnmounted 清理"
      - "前端：IntersectionObserver/ResizeObserver/MutationObserver 是否 disconnect"
      - "前端：Pinia subscription、route watcher、event bus listener 是否 unsubscribe"
      - "前端：WebSocket/SSE/polling 是否在组件销毁时关闭"
      - "重复 mount/unmount 场景（弹窗、tab、条件路由）是否会累积泄漏"

  - dimension: "边界条件与隐式假设"
    source: "references/technical-risk-checks.md ## Correctness (boundary specifics)"
    verdict_required: true
    items:
      - "数组/切片访问前是否检查长度（arr[0] 需要 len > 0）"
      - ".find()/.filter()[0]/map lookup 是否处理未找到的情况"
      - ".split() 结果是否假设固定长度（如 path.split('/')[2]）"
      - "分页 offset+limit 是否校验不超过集合大小"
      - "null/undefined/empty 输入是否在所有分支都有处理"
      - "除零、溢出、off-by-one 是否检查"

  - dimension: "并发竞态与状态安全"
    source: "references/technical-risk-checks.md ## Concurrency and state safety"
    verdict_required: true
    items:
      - "后端：SELECT-then-UPDATE 是否用事务或行锁防止 lost update"
      - "后端：库存扣减、余额变更是否用乐观锁/版本号/WHERE 条件"
      - "后端：是否存在 compare-and-swap 缺失导致的竞态"
      - "前端：用户触发的 action 是否有 in-flight guard（防双击/多 tab）"
      - "前端：并发异步操作（轮询+手动刷新）是否处理响应顺序"
      - "前端：async handler/route watcher/form submit/polling 是否处理 stale response"
      - "retry/timeout/idempotency 是否正确处理"

  - dimension: "初始化顺序与隐式依赖"
    source: "references/production-readiness-checks.md ## Initialization order and implicit dependencies"
    verdict_required: true
    items:
      - "后端：全局变量/var pkg = mustConnect() 是否在测试环境或模块重排时安全"
      - "后端：init() 函数是否依赖其他包的 init() 执行顺序"
      - "后端：init() 是否依赖环境变量或外部状态"
      - "前端：Pinia store setup() 是否依赖尚未初始化的其他 store 或 plugin"
      - "初始化失败是否 silent 或产生 undefined behavior"

  - dimension: "可观测性缺口"
    source: "references/production-readiness-checks.md ## Observability gaps"
    verdict_required: true
    items:
      - "关键决策路径（权限检查/支付回调/任务入队/缓存降级/重试/超时）是否 log 足够上下文"
      - "err != nil 分支是否 log error 而非 silent return"
      - "log level（debug/info/warn/error）是否匹配实际影响"
      - "前端关键用户行为（表单提交/支付确认/导出/删除）是否有埋点"
      - "生产故障时是否有足够证据诊断（user/resource/decision/reason）"

  - dimension: "向后兼容性与迁移"
    source: "references/production-readiness-checks.md ## Backward compatibility and migration"
    verdict_required: true
    items:
      - "API 字段改名/类型变更/新增必填字段是否兼容老客户端"
      - "响应新增枚举值时老前端是否能处理"
      - "DTO 新增必填字段是否有服务端默认值或客户端 fallback"
      - "数据库 schema 新增 NOT NULL 列是否有 default 或 backfill"
      - "列类型变更是否兼容灰度期间新旧代码同时写"
      - "是否需要有序部署（DB first 还是 code first）"
      - "回滚是否安全"

  - dimension: "配置默认值与校验"
    source: "references/production-readiness-checks.md ## Configuration defaults and validation"
    verdict_required: true
    items:
      - "timeout/retry/concurrency/rate-limit 默认值是否安全（不为 0/无限/unbounded）"
      - "安全配置（CORS origins/allowed IPs/secret key）是否默认 deny-all 或拒绝 placeholder"
      - "配置值是否在启动时校验（类型/范围/格式/必填）"
      - "必填配置缺失/空/格式错误时是否 fail-fast 而非 runtime 才炸"

  - dimension: "错误处理用户体验"
    source: "references/production-readiness-checks.md ## Error handling user experience"
    verdict_required: true
    items:
      - "前端：catch(err) { message.error(err.message) } 是否暴露技术错误（Network Error/500）"
      - "前端：表单校验错误是否指出具体字段和修改方向"
      - "前端：关键流程失败（提交/导出/支付）是否提供 fallback/retry/联系方式"
      - "后端：API 错误是否区分 4xx（客户端可修复）和 5xx（服务端重试）"
      - "用户看到错误消息后是否知道下一步怎么办"

# 可选：结构性质量维度（已在原有 skill 里覆盖，这里作为补充）
supplementary_dimensions:
  - dimension: "结构性债务"
    source: "references/engineering-standards.md ## Clean code, Maintainability"
    verdict_required: false
    items:
      - "超大文件：Vue SFC/route view >700 行、backend service/repo >800 行、函数 >80 行"
      - "混合职责：state ownership、渲染、持久化、授权、async 编排混在一起"
      - "是否该按真实 owner 边界提取组件/composable/service/mapper"

  - dimension: "测试质量"
    source: "references/test-strategy-review.md"
    verdict_required: false
    items:
      - "测试是否覆盖会 break 的行为，而非只测 happy path"
      - "边界值/invalid input/empty state/failure path 是否测到"
      - "assertion 是否验证结果，而非只检查代码跑了"
      - "并发/timing/retry/caching/permission 是否直接测"
      - "decomposition 后测试是否仍保护行为，而非只测文件存在"
